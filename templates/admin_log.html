{% extends "base.html" %}
{% block title %}Вход администратора{% endblock %}

{% block content %}
<div class="card">
  <h1>Админ-вход</h1>
  <form method="post">
    <label>Логин</label>
    <input type="text" name="login" required>

    <label>Пароль</label>
    <input type="password" name="password" required>

    <button type="submit">Войти</button>
  </form>

  <p><a href="{{ url_for('login') }}">Назад к обычному входу</a></p>
</div>
{% endblock %}
