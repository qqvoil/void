{% extends "base.html" %}
{% block title %}Вход{% endblock %}

{% block content %}
<style>
  .login-page {
    position: relative;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 120px 24px 48px;
    overflow: hidden;
  }

  .login-page::before {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    background:
      radial-gradient(circle at 50% 18%, rgba(255, 255, 255, 0.03), transparent 22%),
      radial-gradient(circle at 18% 78%, rgba(255, 255, 255, 0.015), transparent 24%),
      radial-gradient(circle at 82% 72%, rgba(255, 255, 255, 0.012), transparent 24%);
    filter: blur(18px);
    opacity: 0.9;
  }

  .login-topmark {
    position: absolute;
    top: 26px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 2;
    pointer-events: none;
  }

  .login-topmark img {
    width: 110px;
    opacity: 0.94;
    filter:
      drop-shadow(0 0 12px rgba(255, 255, 255, 0.07))
      drop-shadow(0 0 28px rgba(255, 255, 255, 0.04));
  }

  .login-shell {
    position: relative;
    z-index: 2;
    width: min(560px, 100%);
  }

  .login-card {
    position: relative;
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 28px;
    padding: 34px 30px 28px;
    background:
      linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0.008)),
      rgba(8, 8, 8, 0.72);
    backdrop-filter: blur(18px);
    box-shadow:
      0 30px 80px rgba(0, 0, 0, 0.42),
      inset 0 1px 0 rgba(255, 255, 255, 0.03);
    overflow: hidden;
  }

  .login-card::after {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    background:
      radial-gradient(circle at 50% 0%, rgba(255, 255, 255, 0.04), transparent 28%);
    opacity: 0.5;
  }

  .login-head {
    position: relative;
    z-index: 1;
    margin-bottom: 26px;
    text-align: center;
  }

  .login-kicker {
    display: inline-block;
    margin-bottom: 10px;
    color: rgba(255, 255, 255, 0.38);
    font-size: 0.72rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
  }

  .login-title {
    margin: 0;
    font-family: "Cormorant Garamond", serif;
    font-size: clamp(2.6rem, 5vw, 3.8rem);
    line-height: 0.95;
    font-weight: 600;
    letter-spacing: 0.01em;
    color: rgba(245, 241, 238, 0.96);
  }

  .login-subtitle {
    margin: 14px auto 0;
    max-width: 420px;
    color: rgba(240, 234, 229, 0.52);
    font-size: 0.98rem;
    line-height: 1.5;
  }

  .login-form {
    position: relative;
    z-index: 1;
    display: grid;
    gap: 16px;
  }

  .login-field {
    display: grid;
    gap: 8px;
  }

  .login-label {
    color: rgba(240, 234, 229, 0.72);
    font-size: 0.92rem;
    letter-spacing: 0.01em;
  }

  .login-input {
    width: 100%;
    height: 58px;
    border: 1px solid rgba(255, 255, 255, 0.12);
    border-radius: 16px;
    padding: 0 18px;
    background: rgba(255, 255, 255, 0.03);
    color: rgba(245, 241, 238, 0.96);
    outline: none;
    transition:
      border-color 400ms cubic-bezier(0.22, 1, 0.36, 1),
      background 400ms cubic-bezier(0.22, 1, 0.36, 1),
      box-shadow 400ms cubic-bezier(0.22, 1, 0.36, 1);
  }

  .login-input::placeholder {
    color: rgba(240, 234, 229, 0.26);
  }

  .login-input:focus {
    border-color: rgba(255, 255, 255, 0.26);
    background: rgba(255, 255, 255, 0.045);
    box-shadow:
      0 0 0 1px rgba(255, 255, 255, 0.06),
      0 0 18px rgba(255, 255, 255, 0.04);
  }

  .login-submit {
    margin-top: 6px;
    height: 62px;
    border: 1px solid rgba(255, 255, 255, 0.16);
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.04);
    color: rgba(245, 241, 238, 0.96);
    font-weight: 600;
    letter-spacing: 0.01em;
    cursor: pointer;
    transition:
      background 700ms cubic-bezier(0.22, 1, 0.36, 1),
      border-color 700ms cubic-bezier(0.22, 1, 0.36, 1),
      color 700ms cubic-bezier(0.22, 1, 0.36, 1),
      box-shadow 700ms cubic-bezier(0.22, 1, 0.36, 1);
  }

  .login-submit:hover {
    background: #f1f1f1;
    color: #050505;
    border-color: rgba(255, 255, 255, 0.9);
    box-shadow:
      inset 0 1px 0 rgba(255, 255, 255, 0.9),
      inset 0 -18px 28px rgba(0, 0, 0, 0.1),
      0 0 28px rgba(255, 255, 255, 0.08);
  }

  .login-bottom {
    position: relative;
    z-index: 1;
    margin-top: 22px;
    padding-top: 18px;
    border-top: 1px solid rgba(255, 255, 255, 0.08);
    text-align: center;
  }

  .login-bottom p {
    margin: 0;
    color: rgba(240, 234, 229, 0.48);
    font-size: 0.95rem;
  }

  .login-link {
    color: rgba(245, 241, 238, 0.88);
    transition: color 300ms ease;
  }

  .login-link:hover {
    color: #ffffff;
  }

  @media (max-width: 640px) {
    .login-page {
      padding: 104px 16px 24px;
    }

    .login-topmark img {
      width: 96px;
    }

    .login-card {
      padding: 28px 18px 22px;
      border-radius: 22px;
    }

    .login-title {
      font-size: clamp(2.2rem, 9vw, 3rem);
    }

    .login-subtitle {
      font-size: 0.92rem;
    }

    .login-input {
      height: 54px;
      padding: 0 16px;
      border-radius: 14px;
    }

    .login-submit {
      height: 58px;
    }
  }
</style>

<div class="login-page">
  <div class="login-topmark" aria-hidden="true">
    <img src="{{ url_for('static', filename='img/minimal.png') }}" alt="Void">
  </div>

  <div class="login-shell">
    <div class="login-card">
      <div class="login-head">
        <span class="login-kicker">Void Portal</span>
        <h1 class="login-title">Вход</h1>
        <p class="login-subtitle">
          Войди в аккаунт, чтобы открыть доступ к личному кабинету и подписке.
        </p>
      </div>

      <form method="post" class="login-form">
        <div class="login-field">
          <label class="login-label" for="full_name">ФИО</label>
          <input
            class="login-input"
            type="text"
            id="full_name"
            name="full_name"
            placeholder="Введите ФИО"
            required
          >
        </div>

        <div class="login-field">
          <label class="login-label" for="password">Пароль</label>
          <input
            class="login-input"
            type="password"
            id="password"
            name="password"
            placeholder="Введите пароль"
            required
          >
        </div>

        <button type="submit" class="login-submit">Войти</button>
      </form>

      <div class="login-bottom">
        <p>
          Нет аккаунта?
          <a href="{{ url_for('register') }}" class="login-link">Зарегистрироваться</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
