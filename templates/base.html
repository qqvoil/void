<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>{% block title %}VPN кабинет{% endblock %}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 960px;
      margin: 0 auto;
      padding: 24px;
      background: #f7f7f7;
      color: #111;
    }
    .card {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
    }
    input, select, button, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 6px;
      margin-bottom: 14px;
      box-sizing: border-box;
    }
    button {
      cursor: pointer;
    }
    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .flash {
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 16px;
    }
    .flash.success {
      background: #e9f9ee;
      border: 1px solid #9ad0a8;
    }
    .flash.error {
      background: #fdeaea;
      border: 1px solid #e0a4a4;
    }
    a {
      color: #0b57d0;
      text-decoration: none;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th, td {
      border: 1px solid #ddd;
      padding: 10px;
      vertical-align: top;
    }
    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .small {
      font-size: 14px;
      color: #555;
    }
  </style>
</head>
<body>
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for category, message in messages %}
        <div class="flash {{ category }}">{{ message }}</div>
      {% endfor %}
    {% endif %}
  {% endwith %}

  {% block content %}{% endblock %}
</body>
</html>
